[project]
name = "evals"
version = "0.1.0"
description = "Response quality scoring: heuristics, LLM-as-judge, and composite quality-per-dollar reward"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/evals"]
