[project]
name = "bandit-core"
version = "0.1.0"
description = "Pure contextual-bandit library: policies, simulation harness, off-policy evaluation"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bandit_core"]
